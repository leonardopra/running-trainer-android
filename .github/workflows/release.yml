name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # create GitHub Releases and upload the APK

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Check signing secrets
        id: secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      # Same keystore as the former monorepo releases: the applicationId is
      # unchanged (com.leopra.runningtrainer), so users can upgrade in place.
      - name: Decode keystore
        if: steps.secrets.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > key.properties

      - name: Build APK (signed release)
        if: steps.secrets.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease
          echo "APK_PATH=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"

      # Without signing secrets the release ships the debug APK. It installs
      # fine, but the debug keystore is regenerated on every CI run, so
      # upgrading between releases requires uninstalling first.
      - name: Build APK (debug — no signing secrets available)
        if: steps.secrets.outputs.has_keystore == 'false'
        run: |
          ./gradlew assembleDebug
          echo "APK_PATH=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Running Trainer ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.APK_PATH }}
